<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel Kierownika</title>

<style>

body{
background:#0b1430;
color:white;
font-family:Arial,sans-serif;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
border:1px solid #334155;
margin-bottom:20px;
}
.card-link{
  display:block;
  color:white;
  text-decoration:none;
}

.card-link .card{
  cursor:pointer;
  transition:0.2s;
}

.card-link .card:hover{
  transform:translateY(-3px);
  border-color:#38bdf8;
  box-shadow:0 0 20px rgba(56,189,248,0.15);
}

.card-title{
  color:#38bdf8;
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.card-description{
  color:#cbd5e1;
  font-size:14px;
}
  
h1{
color:#38bdf8;
}

</style>
</head>
<body>

<h1>
👨‍💼 PANEL KIEROWNIKA
</h1>

<a href="statki.html" class="card-link">

  <div class="card">
    <div class="card-title">
      🚢 Wszystkie statki
    </div>

    <div class="card-description">
      Lista jednostek, terminów postoju i osób odpowiedzialnych
    </div>
  </div>

</a>

<div class="card">
📢 Komunikaty
<br><br>
WERSJA 1.0
</div>

<div class="card">
📊 Statystyki
<br><br>
WERSJA 1.0
</div>

</body>
</html>
