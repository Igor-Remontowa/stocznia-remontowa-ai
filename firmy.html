<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIRMY KOOPERACYJNE</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:40px;
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
}

h1{
  text-align:center;
  color:#38bdf8;
  margin-bottom:40px;
  font-size:42px;
}

.search-container{
  max-width:1000px;
  margin:auto;
  margin-bottom:40px;
}

#searchInput{
  width:100%;
  padding:22px;
  border:none;
  border-radius:18px;
  background:#1e293b;
  color:white;
  font-size:20px;
  outline:none;
  border:1px solid #334155;
}

#searchInput:focus{
  border-color:#38bdf8;
}

.results{
  max-width:1200px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:#1e293b;
  border-radius:18px;
  padding:25px;
  border:1px solid #334155;
  transition:0.2s;
}

.card:hover{
  border-color:#38bdf8;
  transform:translateY(-3px);
}

.company{
  color:#38bdf8;
  font-size:30px;
  font-weight:bold;
  margin-bottom:20px;
}

.section{
  margin-bottom:16px;
}

.label{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:5px;
}

.value{
  font-size:15px;
  line-height:1.7;
}

.value a{
  color:#38bdf8;
  text-decoration:none;
}

.value a:hover{
  text-decoration:underline;
}

.tags{
  margin-top:5px;
}

.tag{
  display:inline-block;
  background:#0f172a;
  border:1px solid #334155;
  border-radius:8px;
  padding:6px 10px;
  margin:4px;
  font-size:12px;
}
  .details-button{

  display:inline-block;

  margin-top:20px;

  padding:12px 20px;

  background:#38bdf8;

  color:white;

  text-decoration:none;

  border-radius:10px;

  font-weight:bold;

  transition:.2s;

}

.details-button:hover{

  background:#0ea5e9;

  transform:translateY(-2px);

}

.empty{
  text-align:center;
  color:#64748b;
  margin-top:80px;
  font-size:18px;
}

footer{
  text-align:center;
  margin-top:60px;
  color:#64748b;
  font-size:12px;
}

  .companyHeader{

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    margin-bottom:20px;

}
.companyLogo{

    width:120px;

    height:55px;

    object-fit:contain;

    display:block;

    margin:0 auto 18px auto;

  }

  .company{ 
    text-align:center;

    color:#38bdf8;
    font-size:30px;
    font-weight:bold;

    margin-bottom:20px;

}

  
</style>
</head>

<body>

<h1>🚢 FIRMY KOOPERACYJNE</h1>

<div class="search-container">

<input
type="text"
id="searchInput"
placeholder="Wpisz nazwę firmy, usługę, miasto, telefon, e-mail..."
>

</div>

<div class="empty" id="emptyMessage">
Wpisz frazę aby rozpocząć wyszukiwanie
</div>

<div class="results" id="resultsContainer"></div>

<footer>
GDAŃSKA STOCZNIA REMONTOWA • BAZA FIRM KOOPERACYJNYCH
</footer>

<script src="companies.js"></script>

<script>

const searchInput = document.getElementById("searchInput");
const resultsContainer = document.getElementById("resultsContainer");
const emptyMessage = document.getElementById("emptyMessage");

searchInput.addEventListener("input", function(){

  const query = searchInput.value.toLowerCase().trim();

  resultsContainer.innerHTML = "";

  if(query === ""){

    emptyMessage.style.display = "block";
    return;

  }

  emptyMessage.style.display = "none";

  const filtered = companies.filter(company => {

    const fullText = `
      ${company.name}
      ${company.services}
      ${company.location}
      ${company.contact}
      ${company.phone}
      ${company.email}
      ${company.website}
      ${company.tags.join(" ")}
    `.toLowerCase();

    return fullText.includes(query);

  });

  if(filtered.length === 0){

    resultsContainer.innerHTML = `
      <div class="empty">
        Brak wyników dla:
        <strong>${query}</strong>
      </div>
    `;

    return;

  }

  filtered.forEach(company => {

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `

  
    <div class="companyHeader">

${company.logo ? `
<img
    src="${company.logo}"
    class="companyLogo"
    alt="${company.name}">
` : ""}

<div class="company">
    ${company.name || "-"}
</div>

</div>

      <div class="section">
        <div class="label">Zakres prac</div>
        <div class="value">
          ${company.services || "-"}
        </div>
      </div>

      <div class="section">
        <div class="label">Siedziba</div>
        <div class="value">
          ${company.location || "-"}
        </div>
      </div>

      <div class="section">
        <div class="label">Osoba kontaktowa</div>
        <div class="value">
          ${company.contact || "-"}
        </div>
      </div>

      <div class="section">
        <div class="label">Telefon</div>
        <div class="value">
          ${company.phone || "-"}
        </div>
      </div>

      <div class="section">
        <div class="label">E-mail</div>
        <div class="value">
          ${
            company.email
            ? `<a href="mailto:${company.email}">${company.email}</a>`
            : "-"
          }
        </div>
      </div>

      <div class="section">
        <div class="label">Strona internetowa</div>
        <div class="value">
          ${
            company.website
            ? `<a href="${company.website}" target="_blank">${company.website}</a>`
            : "-"
          }
        </div>
      </div>

      <div class="section">

        <div class="label">Tagi</div>

        <div class="tags">

          ${
            company.tags
            .map(tag => `<span class="tag">${tag}</span>`)
            .join("")
          }

        </div>

      </div>

      <div style="text-align:right;">

<a
class="details-button"
href="firma-${company.name.toLowerCase().replace(/\s+/g,'-')}.html">

📋 Szczegóły współpracy

</a>

</div>

    `;

    resultsContainer.appendChild(card);

  });

});

</script>

</body>
</html>
