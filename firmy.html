<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FIRMY KOOPERACYJNE</title>

  <style>

    body{
      margin:0;
      padding:40px;
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
    }

    h1{
      text-align:center;
      color:#38bdf8;
      margin-bottom:30px;
    }

    .search-container{
      max-width:900px;
      margin:auto;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:#1e293b;
      color:white;
      font-size:16px;
      outline:none;
      border:1px solid #334155;
    }

    input:focus{
      border-color:#38bdf8;
    }

    .filters{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    button{
      background:#1e293b;
      color:white;
      border:none;
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      border:1px solid #334155;
      transition:0.2s;
    }

    button:hover{
      border-color:#38bdf8;
    }

    .container{
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      padding:20px;
      border:1px solid #334155;
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-4px);
      border-color:#38bdf8;
    }

    .company{
      font-size:20px;
      font-weight:bold;
      margin-bottom:15px;
      color:#38bdf8;
    }

    .section{
      margin-bottom:10px;
    }

    .label{
      color:#94a3b8;
      font-size:13px;
      margin-bottom:3px;
    }

    .value{
      font-size:14px;
      line-height:1.5;
    }

    .tag{
      display:inline-block;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:4px 8px;
      margin:4px;
      font-size:12px;
    }

    footer{
      text-align:center;
      margin-top:40px;
      color:#64748b;
      font-size:12px;
    }

  </style>
</head>

<body>

  <h1>🚢 FIRMY KOOPERACYJNE</h1>

  <div class="search-container">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Wpisz nazwę firmy, usługę, specjalizację..."
      onkeyup="searchCompanies()"
    >
  </div>

  <div class="filters">
    <button onclick="filterCompanies('all')">Wszystkie</button>
    <button onclick="filterCompanies('polskie')">Polskie</button>
    <button onclick="filterCompanies('zagraniczne')">Zagraniczne</button>
    <button onclick="filterCompanies('serwis')">Serwisy</button>
  </div>

  <div class="container" id="companiesContainer">

    <div class="card company-card polskie">

      <div class="company">
        MARINE TECH
      </div>

      <div class="section">
        <div class="label">Zakres prac</div>
        <div class="value">
          Spawanie TIG, rurociągi, aluminium
        </div>
      </div>

      <div class="section">
        <div class="label">Kontakt</div>
        <div class="value">
          Jan Kowalski
        </div>
      </div>

      <div class="section">
        <div class="label">Telefon</div>
        <div class="value">
          +48 500 000 000
        </div>
      </div>

      <div class="section">
        <div class="label">E-mail</div>
        <div class="value">
          marine@tech.pl
        </div>
      </div>

      <div class="section">
        <div class="label">Tagi</div>

        <span class="tag">spawanie</span>
        <span class="tag">TIG</span>
        <span class="tag">aluminium</span>
        <span class="tag">rurociągi</span>

      </div>

    </div>

  </div>

  <footer>
    GDAŃSKA STOCZNIA REMONTOWA • BAZA FIRM KOOPERACYJNYCH
  </footer>

  <script>

    function searchCompanies() {

      let input = document.getElementById('searchInput').value.toLowerCase();

      let cards = document.getElementsByClassName('company-card');

      for (let i = 0; i < cards.length; i++) {

        let text = cards[i].innerText.toLowerCase();

        if (text.includes(input)) {
          cards[i].style.display = "block";
        } else {
          cards[i].style.display = "none";
        }

      }

    }

    function filterCompanies(type){

      let cards = document.getElementsByClassName('company-card');

      for(let i = 0; i < cards.length; i++){

        if(type === 'all'){
          cards[i].style.display = "block";
        }

        else if(cards[i].classList.contains(type)){
          cards[i].style.display = "block";
        }

        else{
          cards[i].style.display = "none";
        }

      }

    }

  </script>

</body>
</html>
