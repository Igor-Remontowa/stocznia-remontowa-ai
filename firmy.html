<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FIRMY KOOPERACYJNE</title>

  <style>

    body{
      margin:0;
      padding:40px;
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
    }

    h1{
      text-align:center;
      color:#38bdf8;
      margin-bottom:40px;
      font-size:42px;
    }

    .search-container{
      max-width:1000px;
      margin:auto;
      margin-bottom:40px;
    }

    #searchInput{
      width:100%;
      padding:22px;
      border:none;
      border-radius:18px;
      background:#1e293b;
      color:white;
      font-size:20px;
      outline:none;
      border:1px solid #334155;
      box-sizing:border-box;
    }

    #searchInput:focus{
      border-color:#38bdf8;
    }

    .results{
      max-width:1200px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:25px;
      border:1px solid #334155;
      transition:0.2s;
    }

    .card:hover{
      border-color:#38bdf8;
      transform:translateY(-3px);
    }

    .company{
      color:#38bdf8;
      font-size:28px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .section{
      margin-bottom:14px;
    }

    .label{
      color:#94a3b8;
      font-size:13px;
      margin-bottom:4px;
    }

    .value{
      font-size:15px;
      line-height:1.6;
    }

    .tag{
      display:inline-block;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:5px 10px;
      margin:4px;
      font-size:12px;
    }

    .empty{
      text-align:center;
      color:#64748b;
      margin-top:80px;
      font-size:18px;
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:#64748b;
      font-size:12px;
    }

  </style>
</head>

<body>

  <h1>🚢 FIRMY KOOPERACYJNE</h1>

  <div class="search-container">

    <input
      type="text"
      id="searchInput"
      placeholder="Wpisz nazwę firmy, usługę, specjalizację..."
    >

  </div>

  <div class="empty" id="emptyMessage">
    Wpisz frazę aby rozpocząć wyszukiwanie
  </div>

  <div class="results" id="resultsContainer"></div>

  <footer>
    GDAŃSKA STOCZNIA REMONTOWA • BAZA FIRM KOOPERACYJNYCH
  </footer>

  <script>

    // 🚢 BAZA FIRM

    const companies = [

      {
        name: "DELTA MARINE",
        services: "Spawanie TIG, MIG, ślusarka, aluminium, rurociągi",
        contact: "Jan Kowalski",
        phone: "+48 500 000 001",
        email: "delta@marine.pl",
        tags: ["spawanie","TIG","MIG","aluminium","ślusarka","rurociągi"]
      },

      {
        name: "BALTIC ENGINEERING",
        services: "HVAC, wentylacja, klimatyzacja, chłodnictwo",
        contact: "Piotr Nowak",
        phone: "+48 500 000 002",
        email: "hvac@baltic.pl",
        tags: ["HVAC","wentylacja","klimatyzacja","chłodnictwo"]
      },

      {
        name: "SEA TECH SERVICE",
        services: "Automatyka, elektryka, systemy okrętowe",
        contact: "Adam Wiśniewski",
        phone: "+48 500 000 003",
        email: "service@seatech.pl",
        tags: ["automatyka","elektryka","okrętowe","systemy"]
      },

      {
        name: "NORD SHIP REPAIR",
        services: "Malowanie, piaskowanie, konserwacja",
        contact: "Marek Lewandowski",
        phone: "+48 500 000 004",
        email: "repair@nordship.pl",
        tags: ["malowanie","piaskowanie","konserwacja"]
      }

    ];

    // 🚢 ELEMENTY

    const searchInput = document.getElementById("searchInput");
    const resultsContainer = document.getElementById("resultsContainer");
    const emptyMessage = document.getElementById("emptyMessage");

    // 🚢 WYSZUKIWANIE

    searchInput.addEventListener("keyup", function(){

      const query = searchInput.value.toLowerCase().trim();

      resultsContainer.innerHTML = "";

      if(query === ""){

        emptyMessage.style.display = "block";
        return;

      }

      emptyMessage.style.display = "none";

      const filtered = companies.filter(company => {

        const fullText = `
          ${company.name}
          ${company.services}
          ${company.contact}
          ${company.email}
          ${company.tags.join(" ")}
        `.toLowerCase();

        return fullText.includes(query);

      });

      if(filtered.length === 0){

        resultsContainer.innerHTML = `
          <div class="empty">
            Brak wyników dla:
            <strong>${query}</strong>
          </div>
        `;

        return;

      }

      filtered.forEach(company => {

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

          <div class="company">
            ${company.name}
          </div>

          <div class="section">
            <div class="label">Zakres prac</div>
            <div class="value">
              ${company.services}
            </div>
          </div>

          <div class="section">
            <div class="label">Kontakt</div>
            <div class="value">
              ${company.contact}
            </div>
          </div>

          <div class="section">
            <div class="label">Telefon</div>
            <div class="value">
              ${company.phone}
            </div>
          </div>

          <div class="section">
            <div class="label">E-mail</div>
            <div class="value">
              ${company.email}
            </div>
          </div>

          <div class="section">
            <div class="label">Tagi</div>

            ${company.tags.map(tag => `
              <span class="tag">${tag}</span>
            `).join("")}

          </div>

        `;

        resultsContainer.appendChild(card);

      });

    });

  </script>

</body>
</html>
