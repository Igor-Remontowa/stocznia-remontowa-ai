<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRMY KOOPERACYJNE</title>

  <style>

    body{
      margin:0;
      padding:40px;
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
    }

    h1{
      text-align:center;
      color:#38bdf8;
      margin-bottom:40px;
      font-size:48px;
    }

    .search-container{
      max-width:1000px;
      margin:auto;
      margin-bottom:40px;
    }

    input{
      width:100%;
      padding:22px;
      border:none;
      border-radius:18px;
      background:#1e293b;
      color:white;
      font-size:20px;
      outline:none;
      border:1px solid #334155;
      box-sizing:border-box;
    }

    input:focus{
      border-color:#38bdf8;
    }

    .results{
      max-width:1200px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:25px;
      border:1px solid #334155;
      display:none;
    }

    .company{
      color:#38bdf8;
      font-size:28px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .section{
      margin-bottom:15px;
    }

    .label{
      color:#94a3b8;
      font-size:13px;
      margin-bottom:5px;
    }

    .value{
      font-size:16px;
      line-height:1.6;
    }

    .tag{
      display:inline-block;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:8px;
      padding:5px 10px;
      margin:4px;
      font-size:12px;
    }

    .empty{
      text-align:center;
      color:#64748b;
      margin-top:80px;
      font-size:18px;
    }

    footer{
      text-align:center;
      margin-top:50px;
      color:#64748b;
      font-size:12px;
    }

  </style>
</head>

<body>

  <h1>🚢 FIRMY KOOPERACYJNE</h1>

  <div class="search-container">
    <input
      type="text"
      id="searchInput"
      placeholder="Wpisz nazwę firmy, usługę lub specjalizację..."
      onkeyup="searchCompanies(event)"
    >
  </div>

  <div class="empty" id="emptyMessage">
    Wpisz frazę aby rozpocząć wyszukiwanie
  </div>

  <div class="results">

    <div class="card company-card">

      <div class="company">
        MARINE TECH
      </div>

      <div class="section">
        <div class="label">Zakres prac</div>
        <div class="value">
          Spawanie TIG, ślusarka, rurociągi, aluminium
        </div>
      </div>

      <div class="section">
        <div class="label">Kontakt</div>
        <div class="value">
          Jan Kowalski
        </div>
      </div>

      <div class="section">
        <div class="label">Telefon</div>
        <div class="value">
          +48 500 000 000
        </div>
      </div>

      <div class="section">
        <div class="label">E-mail</div>
        <div class="value">
          marine@tech.pl
        </div>
      </div>

      <div class="section">
        <div class="label">Tagi</div>

        <span class="tag">spawanie</span>
        <span class="tag">ślusarka</span>
        <span class="tag">TIG</span>
        <span class="tag">aluminium</span>
        <span class="tag">rurociągi</span>

      </div>

    </div>

  </div>

  <footer>
    GDAŃSKA STOCZNIA REMONTOWA • BAZA FIRM KOOPERACYJNYCH
  </footer>

  <script>

    function searchCompanies(event){

      let input = document.getElementById("searchInput").value.toLowerCase();

      let cards = document.getElementsByClassName("company-card");

      let emptyMessage = document.getElementById("emptyMessage");

      if(input.trim() === ""){

        emptyMessage.style.display = "block";

        for(let i = 0; i < cards.length; i++){
          cards[i].style.display = "none";
        }

        return;
      }

      emptyMessage.style.display = "none";

      for(let i = 0; i < cards.length; i++){

        let text = cards[i].innerText.toLowerCase();

        if(text.includes(input)){
          cards[i].style.display = "block";
        }

        else{
          cards[i].style.display = "none";
        }

      }

    }

  </script>

</body>
</html>
